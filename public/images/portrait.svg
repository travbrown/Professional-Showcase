      <path d="M48,-15 C52,-45 48,-75 35,-90 C25,-100 10,-105 0,-106"/>
      <!-- Curly hair details -->
      <circle cx="-38" cy="-80" r="7" stroke-width="2"/>
      <circle cx="-22" cy="-92" r="8" stroke-width="2"/>
      <circle cx="-5" cy="-97" r="7" stroke-width="2"/>
      <circle cx="12" cy="-95" r="7" stroke-width="2"/>
      <circle cx="28" cy="-87" r="8" stroke-width="2"/>
      <circle cx="40" cy="-73" r="7" stroke-width="2"/>
      <circle cx="-46" cy="-65" r="6" stroke-width="2"/>
      <circle cx="-48" cy="-45" r="6" stroke-width="2"/>
      <circle cx="46" cy="-60" r="6" stroke-width="2"/>
      <circle cx="48" cy="-40" r="6" stroke-width="2"/>
      <circle cx="-30" cy="-98" r="6" stroke-width="2"/>
      <circle cx="20" cy="-95" r="6" stroke-width="2"/>
      <circle cx="36" cy="-82" r="6" stroke-width="2"/>
      <circle cx="-42" cy="-72" r="5" stroke-width="2"/>
    </g>
    <!-- Ears -->
    <path d="M-52,-10 C-60,-10 -62,0 -58,10 C-55,18 -52,15 -52,10" stroke-width="2"/>
    <path d="M52,-10 C60,-10 62,0 58,10 C55,18 52,15 52,10" stroke-width="2"/>
    <!-- Glasses -->
    <g stroke-width="2.5">
      <!-- Left lens -->
      <rect x="-42" y="-28" width="35" height="24" rx="4"/>
      <!-- Right lens -->
      <rect x="7" y="-28" width="35" height="24" rx="4"/>
      <!-- Bridge -->
      <path d="M-7,-18 C-3,-22 3,-22 7,-18"/>
      <!-- Arms -->
      <path d="M-42,-22 L-54,-18"/>
      <path d="M42,-22 L54,-18"/>
    </g>
    <!-- Eyes behind glasses -->
    <g stroke-width="2">
      <circle cx="-24" cy="-16" r="3" fill="#1a2744"/>
      <circle cx="24" cy="-16" r="3" fill="#1a2744"/>
    </g>
    <!-- Eyebrows -->
    <path d="M-38,-32 C-32,-37 -18,-37 -12,-33" stroke-width="2.5"/>
    <path d="M12,-33 C18,-37 32,-37 38,-32" stroke-width="2.5"/>
    <!-- Nose -->
    <path d="M0,-12 C0,-2 -3,8 -8,12 C-3,14 3,14 8,12" stroke-width="2"/>
    <!-- Mouth/slight smile -->
    <path d="M-12,22 C-6,28 6,28 12,22" stroke-width="2"/>
    <!-- Beard/stubble area -->
    <g stroke-width="1" opacity="0.4">
      <path d="M-35,15 C-30,35 -15,45 0,47 C15,45 30,35 35,15" stroke-dasharray="2,3"/>
      <path d="M-30,20 C-25,35 -12,42 0,44 C12,42 25,35 30,20" stroke-dasharray="2,3"/>
      <path d="M-15,28 L-15,40" stroke-dasharray="1,4"/>
      <path d="M-8,30 L-8,43" stroke-dasharray="1,4"/>
      <path d="M0,32 L0,45" stroke-dasharray="1,4"/>
      <path d="M8,30 L8,43" stroke-dasharray="1,4"/>
      <path d="M15,28 L15,40" stroke-dasharray="1,4"/>
