<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#ffffff"/>
  <g transform="translate(200,185)" fill="none" stroke="#1a2744" stroke-linecap="round" stroke-linejoin="round">
    <!-- Suit/Shoulders -->
    <g stroke-width="3">
      <path d="M-95,120 C-95,80 -55,60 -30,55 L-10,75 L0,65 L10,75 L30,55 C55,60 95,80 95,120 L95,160 L-95,160 Z" fill="#2a3f5f" stroke="#1a2744"/>
      <!-- Shirt collar -->
      <path d="M-25,58 L-10,85 L0,72 L10,85 L25,58" fill="#ffffff" stroke="#1a2744" stroke-width="2"/>
      <!-- Tie -->
      <path d="M0,72 L-7,100 L0,130 L7,100 Z" fill="#1a2744" stroke="none"/>
      <path d="M-5,100 L5,100" stroke="#2a3f5f" stroke-width="1"/>
      <path d="M-4,108 L4,108" stroke="#2a3f5f" stroke-width="1"/>
      <path d="M-3,116 L3,116" stroke="#2a3f5f" stroke-width="1"/>
    </g>
    <!-- Neck -->
    <path d="M-18,42 L-18,58 M18,42 L18,58" stroke-width="2.5"/>
    <!-- Head shape -->
    <path d="M-52,-10 C-52,-75 -40,-100 0,-105 C40,-100 52,-75 52,-10 C52,25 35,52 0,55 C-35,52 -52,25 -52,-10" stroke-width="2.5"/>
